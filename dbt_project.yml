# ------------------------------------------------------------------------
# Project Configuration
# ------------------------------------------------------------------------
name: 'recove_trends'
version: '1.0.0'
config-version: 2

# This tells dbt Cloud which connection to use (matches your setup)
profile: 'default'

# ------------------------------------------------------------------------
# Directory Paths
# ------------------------------------------------------------------------
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# ------------------------------------------------------------------------
# Default Model Configurations
# ------------------------------------------------------------------------
models:
  recove_analytics:
    # This ensures any models you build default to Tables rather than Views
    +materialized: table

# ------------------------------------------------------------------------
# Global Project Variables
# ------------------------------------------------------------------------
vars:
  lookback_hours: 24
  attribution_lookback_hours: 48
  click_out_multiplier: 1
  saved_item_multiplier: 3
  image_area_multiplier: 2
  minimum_token_length: 2
  ngrams_n: 3
  top_k: 50
  stop_words: [
    'a', 'an', 'the', 'and', 'or', 'but', 'if', 'because', 'as', 'what', 'when', 'where', 'how', 'why', 'who', 'which', 'this', 'that', 'these', 'those', 'then', 'just', 'so', 'than', 'such', 'both', 'through', 'about', 'for', 'is', 'of', 'while', 'during', 'to', 'from', 'in', 'out', 'on', 'off', 'over', 'under', 'with', 'at', 'by', 'into', 'onto', 'i', 'me', 'my', 'myself', 'we', 'our', 'ours', 'ourselves', 'you', 'your', 'yours', 'he', 'him', 'his', 'she', 'her', 'hers', 'it', 'its', 'they', 'them', 'their', 'am', 'are', 'was', 'were', 'be', 'been', 'being', 'have', 'has', 'had', 'having', 'do', 'does', 'did', 'doing', 'buy', 'shop', 'get', 'look', 'looking', 'find', 'online', 'store', 'sale', 'cheap', 'discount', 'free', 'shipping', 'price', 'new', 'style', 'fashion', 'collection', 'size', 'fit', 'apparel', 'clothing', 'clothes', 'accessories', 'outfit', 'wear', 'item', 'items', 'product', 'men', 'mens', 'women', 'womens', 'boy', 'boys', 'girl', 'girls', 'kids', 'baby', 'toddler', 'unisex', 'male', 'female'
  ]